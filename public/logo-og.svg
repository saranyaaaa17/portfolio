<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="1" />
      <stop offset="1" stop-color="#0b0b0b" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <g transform="translate(60,120)">
    <rect width="450" height="450" rx="40" fill="url(#g2)" />
    <g transform="translate(110,110) scale(3)">
      <rect x="0" y="0" width="12" height="6" rx="1" fill="rgba(255,255,255,0.06)" />
      <rect x="0" y="14" width="12" height="6" rx="1" fill="rgba(255,255,255,0.06)" />
      <text x="6" y="18" font-family="Space Grotesk, Inter, sans-serif" font-weight="700" font-size="20" fill="white">SP</text>
    </g>
  </g>

  <text x="560" y="310" font-family="Space Grotesk, Inter, sans-serif" font-size="56" fill="#E5E7EB" font-weight="700">Saranya Pothina</text>
  <text x="560" y="360" font-family="Inter, sans-serif" font-size="28" fill="#9CA3AF">AI/ML Engineer • Full-Stack Developer</text>

  <style>
    /* subtle vignette */
    rect { shape-rendering: crispEdges; }
  </style>
</svg>
